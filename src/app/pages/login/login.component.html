<div class="login-page">
  <div class="login-card fade-up">
    <div class="login-card__header">
      <div class="login-card__logo">🛡️</div>
      <h1>DetectSen</h1>
      <p>Administration intelligente état civil</p>
    </div>

    <form class="login-form" (ngSubmit)="login()">
      <div class="form-group">
        <label>EMAIL ADMINISTRATEUR</label>
        <input class="form-control" type="email" [(ngModel)]="email" name="email"
               placeholder="admin@detectsen.sn" required />
      </div>
      <div class="form-group">
        <label>MOT DE PASSE</label>
        <input class="form-control" type="password" [(ngModel)]="password" name="password"
               placeholder="••••••••" required />
      </div>

      <p class="login-error" *ngIf="error">{{ error }}</p>

      <button class="btn btn--primary login-btn" type="submit" [disabled]="loading">
        {{ loading ? 'Connexion...' : 'Connexion sécurisée' }}
      </button>
    </form>

    <p class="login-security">
      🔒 Accès réservé aux administrateurs
    </p>
  </div>
</div>
